services:

  order-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-manager
    ports:
      - "9090:9090"
    environment:
      # --- Updated for Camunda 8 SaaS ---
      CAMUNDA_CLIENT_MODE: saas
      CAMUNDA_CLIENT_AUTH_METHOD: oidc
      
      CAMUNDA_CLIENT_CLOUD_CLUSTER-ID: "<CLUSTER_ID>"
      CAMUNDA_CLIENT_CLOUD_REGION: "<REGION>"
      CAMUNDA_CLIENT_AUTH_CLIENT-ID: "<CLIENT_ID>"
      CAMUNDA_CLIENT_AUTH_CLIENT-SECRET: "<CLIENT_SECRET>"
      
      # Optional: Explicitly point to the SaaS OIDC provider
      CAMUNDA_CLIENT_AUTH_TOKEN-URL: "https://login.cloud.camunda.io/oauth/token"
    restart: on-failure
